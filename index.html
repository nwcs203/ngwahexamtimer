<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天主教伍華中學 - 計時控制台</title>
    <style>
        :root {
            --bg-color: #f0f2f5; --text-primary: #1d1d1f; --text-secondary: #86868b;
            --blue: #0071e3; --blue-hover: #0077ed; --red: #ff3b30; --green: #34c759;
            --border: #d2d2d7; --font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", sans-serif;
        }

        body { font-family: var(--font-family); background-color: var(--bg-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        /* --- 登入介面 --- */
        .login-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; margin-top: 10vh; }
        .login-input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 12px; font-size: 16px; box-sizing: border-box; text-align: center; }
        .login-btn { width: 100%; background: var(--blue); color: white; padding: 16px; border: none; border-radius: 12px; font-size: 18px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .login-btn:hover { background: var(--blue-hover); }

        /* --- 儀表板與卡片 --- */
        #mainDashboard { display: none; width: 100%; max-width: 1400px; grid-template-columns: 3fr 1fr; gap: 20px; height: calc(100vh - 100px); }
        .card { background: white; border-radius: 24px; padding: 30px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); display: flex; flex-direction: column; }

        /* --- 超大字體設定 --- */
        .exam-title { font-size: 64px !important; font-weight: 800; color: var(--text-primary); margin-bottom: 10px; text-align: center; }
        .time-display { font-size: 320px !important; font-weight: 800; font-variant-numeric: tabular-nums; line-height: 1; text-align: center; margin: 20px 0; white-space: nowrap; }
        .time-ends-at { font-size: 24px; font-weight: 600; color: var(--text-secondary); text-align: center; background: #f5f5f7; padding: 10px 20px; border-radius: 50px; align-self: center; }

        /* --- 控制區與備註 --- */
        .controls { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 20px; border-top: 1px solid #eee; }
        .btn-group button { padding: 15px 30px; font-size: 20px; font-weight: 600; border-radius: 12px; border: none; cursor: pointer; color: white; margin-right: 10px; }
        .btn-start { background: var(--green); } .btn-pause { background: #ff9f0a; } .btn-reset { background: var(--red); }
        .remarks-area { flex-grow: 1; width: 100%; border: none; font-size: 22px; line-height: 1.6; resize: none; outline: none; background: #fffcf0; padding: 15px; border-radius: 12px; box-sizing: border-box; }

        /* --- 管理員介面 --- */
        #adminView { display: none; text-align: center; padding: 50px; background: white; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 600px; width: 100%; margin-top: 5vh;}
        .sync-status { padding: 20px; border-radius: 12px; background: #e8f5e9; color: #2e7d32; font-weight: bold; margin: 20px 0; font-size: 18px; border: 1px solid #c8e6c9;}
        .header { width: 100%; max-width: 1400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }

        /* --- 彈出視窗 (Modal) --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 1000; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-box { background: #fff; border-radius: 24px; padding: 40px; text-align: center; max-width: 500px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .modal-btn { background: var(--blue); color: white; width: 100%; font-size: 22px; font-weight: bold; padding: 16px; border: none; border-radius: 14px; cursor: pointer; margin-top: 20px;}
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0">天主教伍華中學 <span id="viewName" style="font-weight:400; color:var(--text-secondary)"></span></h2>
        <button id="btnLogout" style="display:none; padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: transparent; cursor: pointer;" onclick="logout()">登出</button>
    </div>

    <div id="loginScreen" class="login-card">
        <h2>歡迎使用監考系統</h2>
        <p style="color:var(--text-secondary); margin-bottom:20px">請選擇身分並輸入密碼</p>
        <select id="roleSelect" class="login-input">
            <option value="user">👨‍🏫 監考老師</option>
            <option value="admin">⚙️ 系統管理員</option>
        </select>
        <input type="password" id="passwordInput" class="login-input" placeholder="密碼" onkeypress="if(event.key === 'Enter') handleLogin()">
        <button class="login-btn" onclick="handleLogin()">登入並開啟系統 (新分頁)</button>
        <p id="loginError" style="color:var(--red); display:none; margin-top:15px; font-weight:bold;">密碼錯誤！</p>
    </div>

    <div id="adminView">
        <h2 style="color: var(--blue);">⚙️ 雲端資料庫管理中心</h2>
        <p style="color: var(--text-secondary); line-height: 1.6;">
            本系統已升級為「Google Sheets 全校雲端同步」。<br>
            請直接在 Google 試算表中修改考卷資料，<br>全校老師的網頁將會自動抓取最新名單！
        </p>
        <div class="sync-status" id="adminSyncStatus">🔄 正在檢查雲端資料庫連線...</div>
        <div style="margin-top: 30px;">
            <a href="https://docs.google.com/spreadsheets/d/1MSJGV3zcA92HWEAsunr4OzQzp22-K7CLZ4W4ZNtJmmk/edit?usp=sharing" target="_blank" style="text-decoration: none;">
                <button class="login-btn" style="background: #0f9d58;">📊 前往 Google Sheets 修改考卷</button>
            </a>
        </div>
        <p style="font-size: 14px; color: #888; margin-top: 20px;">注意：在 Google Sheets 修改後，請等待約 3-5 分鐘讓伺服器更新快取。</p>
    </div>

    <div id="mainDashboard">
        <div class="card">
            <div id="loadingStatus" style="color: var(--blue); font-weight: bold; margin-bottom: 10px;">🔄 正在從雲端同步最新考卷資料...</div>
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:20px">
                <select id="levelSelect" class="login-input" style="margin:0" disabled><option>等待資料載入...</option></select>
                <select id="paperSelect" class="login-input" style="margin:0" disabled><option>請先選級別</option></select>
            </div>
            
            <div class="exam-title" id="examTitle">尚未選擇考卷</div>
            <div class="time-display" id="timeDisplay">00:00:00</div>
            <div class="time-ends-at" id="timeEndsAt">預計結束：--:--</div>

            <div class="controls">
                <div class="btn-group">
                    <button class="btn-start" onclick="startTimer()">開考</button>
                    <button class="btn-pause" onclick="pauseTimer()">暫停</button>
                    <button class="btn-reset" onclick="resetTimer()">重置</button>
                </div>
                <div style="display:flex; align-items:center; background:#eee; padding:5px 15px; border-radius:12px">
                    <input type="number" id="adjMins" value="5" style="width:50px; border:none; background:transparent; font-size:18px; font-weight:bold">
                    <span style="font-size:14px; margin:0 10px">分鐘</span>
                    <button onclick="adjustTime()" style="border:none; background:white; padding:8px 12px; border-radius:8px; cursor:pointer; font-weight:bold">調整</button>
                </div>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-top:0">📝 黑板備註</h3>
            <textarea id="remarksInput" class="remarks-area" placeholder="請在此輸入黑板注意事項..."></textarea>
        </div>
    </div>

    <div class="modal-overlay" id="reminderModal">
        <div class="modal-box">
            <h2 id="modalTitle" style="color: var(--red); font-size: 36px; margin-top: 0;">提醒</h2>
            <p id="modalText" style="color: var(--text-primary); font-size: 26px; font-weight: bold;">內容</p>
            <button class="modal-btn" onclick="closeModal()">我知道了</button>
        </div>
    </div>

    <script>
        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSSqooY9jKm8yYbe4PLhtWGFEgvfq74w0NXdS307UtK4jk_NNaIDa5RO-_xBWswzNftgy-kL695ylDu/pub?output=csv";

        let examDB = {};
        let timer, remaining = 0, isRunning = false, endTime;
        let notified15Min = false, notified5Min = false; 

        // --- 🌟 核心防護：儲存狀態 ---
        function saveExamState() {
            const state = {
                level: document.getElementById('levelSelect').value,
                paperMins: document.getElementById('paperSelect').value,
                title: document.getElementById('examTitle').textContent,
                isRunning: isRunning,
                endTime: endTime,
                remaining: remaining,
                notified15Min: notified15Min,
                notified5Min: notified5Min
            };
            localStorage.setItem('examState', JSON.stringify(state));
        }

        // --- 🌟 核心防護：恢復狀態 ---
        function restoreExamState() {
            const saved = localStorage.getItem('examState');
            if (!saved) return; 
            
            const state = JSON.parse(saved);

            if (state.level) {
                document.getElementById('levelSelect').value = state.level;
                const paperSelect = document.getElementById('paperSelect');
                paperSelect.innerHTML = '<option value="">請選擇考卷...</option>';
                paperSelect.disabled = false;
                if (examDB[state.level]) {
                    examDB[state.level].forEach(p => {
                        let opt = document.createElement('option');
                        opt.value = p.mins; opt.textContent = `${p.name} (${p.mins}分)`;
                        paperSelect.appendChild(opt);
                    });
                }
                document.getElementById('paperSelect').value = state.paperMins;
            }

            document.getElementById('examTitle').textContent = state.title;
            notified15Min = state.notified15Min;
            notified5Min = state.notified5Min;

            if (state.isRunning) {
                remaining = Math.max(0, Math.floor((state.endTime - Date.now()) / 1000));
                endTime = state.endTime;
                isRunning = true;
                
                document.getElementById('levelSelect').disabled = true;
                document.getElementById('paperSelect').disabled = true;

                let endObj = new Date(endTime);
                document.getElementById('timeEndsAt').textContent = `預計結束：${endObj.getHours().toString().padStart(2, '0')}:${endObj.getMinutes().toString().padStart(2, '0')}`;

                updateDisplay();
                
                timer = setInterval(() => {
                    remaining = Math.max(0, Math.floor((endTime - Date.now()) / 1000));
                    updateDisplay();
                    checkReminders(remaining);
                    
                    if (remaining <= 0) { 
                        clearInterval(timer); 
                        isRunning = false; 
                        saveExamState(); 
                    }
                }, 1000);
            } else {
                remaining = state.remaining;
                if (remaining > 0 || state.title !== "尚未選擇考卷") {
                     updateDisplay();
                }
            }
        }

        function handleLogin() {
            const role = document.getElementById('roleSelect').value;
            const pwd = document.getElementById('passwordInput').value;
            
            if ((role === 'user' && pwd === 'NWcs1965!') || (role === 'admin' && pwd === 'NWcs2026!')) {
                sessionStorage.setItem('isLoggedIn', 'true');
                sessionStorage.setItem('userRole', role);
                
                window.open(window.location.href, '_blank');
                
                document.getElementById('loginError').style.color = 'var(--green)';
                document.getElementById('loginError').textContent = '✅ 已在新分頁啟動系統！';
                document.getElementById('loginError').style.display = 'block';
            } else {
                document.getElementById('loginError').style.color = 'var(--red)';
                document.getElementById('loginError').textContent = '密碼錯誤！';
                document.getElementById('loginError').style.display = 'block';
            }
        }

        function logout() { sessionStorage.clear(); window.location.reload(); }

        window.onload = () => {
            const isLoggedIn = sessionStorage.getItem('isLoggedIn');
            const role = sessionStorage.getItem('userRole');

            if (isLoggedIn === 'true') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('btnLogout').style.display = 'block';
                
                if (role === 'admin') {
                    document.getElementById('adminView').style.display = 'block';
                    document.getElementById('viewName').textContent = "(雲端資料管理)";
                    fetchCloudData('admin');
                } else {
                    document.getElementById('mainDashboard').style.display = 'grid';
                    document.getElementById('viewName').textContent = "(監考模式)";
                    fetchCloudData('user');
                }
            }
        };

        async function fetchCloudData(mode) {
            try {
                const timeStamp = new Date().getTime();
                const fetchUrl = GOOGLE_SHEET_CSV_URL + "&t=" + timeStamp;

                const response = await fetch(fetchUrl);
                if (!response.ok) throw new Error("網路請求失敗");
                
                const csvText = await response.text();
                const lines = csvText.split('\n');
                
                const today = new Date();
                const todayYear = today.getFullYear();
                const todayMonth = today.getMonth();
                const todayDate = today.getDate();
                
                let newDB = {};
                
                for(let i = 1; i < lines.length; i++) {
                    if (!lines[i].trim()) continue;
                    let cols = lines[i].split(',');
                    
                    if(cols.length >= 5) {
                        let dateStr = cols[0].trim();
                        let level = cols[1].trim();  
                        let name = cols[3].trim();   
                        let mins = parseInt(cols[4].trim()); 
                        
                        let isToday = false;
                        let sheetDate = new Date(dateStr); 
                        if (!isNaN(sheetDate)) {
                            isToday = (sheetDate.getFullYear() === todayYear &&
                                       sheetDate.getMonth() === todayMonth &&
                                       sheetDate.getDate() === todayDate);
                        }

                        if (mode === 'user' && !isToday) continue; 

                        if (!isNaN(mins)) {
                            if(!newDB[level]) newDB[level] = [];
                            newDB[level].push({ name: name, mins: mins });
                        }
                    }
                }
                
                examDB = newDB;
                
                if (mode === 'user') {
                    document.getElementById('loadingStatus').innerHTML = "✅ 已成功連線！系統已自動為您篩選【今日試卷】。";
                    setTimeout(() => document.getElementById('loadingStatus').style.display = 'none', 3000);
                    
                    if (Object.keys(examDB).length === 0) {
                        document.getElementById('levelSelect').innerHTML = '<option>今日無排定考試</option>';
                    } else {
                        buildDropdowns();
                        restoreExamState(); // 🌟 資料載入後恢復狀態
                    }
                    
                } else if (mode === 'admin') {
                    document.getElementById('adminSyncStatus').innerHTML = "✅ 雲端連線正常！老師端將只會看見【當日日期】的試卷。";
                }
                
            } catch (error) {
                console.error(error);
                if (mode === 'user') document.getElementById('loadingStatus').innerHTML = "❌ 雲端資料讀取失敗，請聯絡系統管理員。";
                if (mode === 'admin') document.getElementById('adminSyncStatus').innerHTML = "❌ 連線失敗！請確認 Google Sheets 連結是否正確。";
            }
        }

        function buildDropdowns() {
            const levelSelect = document.getElementById('levelSelect');
            levelSelect.disabled = false;
            levelSelect.innerHTML = '<option value="">請選擇級別...</option>';
            for (let level in examDB) {
                let opt = document.createElement('option');
                opt.value = level; opt.textContent = level;
                levelSelect.appendChild(opt);
            }
            if (localStorage.getItem('remarks')) document.getElementById('remarksInput').value = localStorage.getItem('remarks');
        }

        document.getElementById('levelSelect').onchange = function() {
            const paperSelect = document.getElementById('paperSelect');
            paperSelect.innerHTML = '<option value="">請選擇考卷...</option>';
            if (this.value) {
                paperSelect.disabled = false;
                examDB[this.value].forEach(p => {
                    let opt = document.createElement('option');
                    opt.value = p.mins; opt.textContent = `${p.name} (${p.mins}分)`;
                    paperSelect.appendChild(opt);
                });
            } else {
                paperSelect.disabled = true;
            }
            saveExamState(); // 🌟
        };

        document.getElementById('paperSelect').onchange = function() {
            if (this.value) {
                remaining = this.value * 60;
                document.getElementById('examTitle').textContent = this.options[this.selectedIndex].text.split(' (')[0];
                updateDisplay();
                saveExamState(); // 🌟
            }
        };

        function updateDisplay() {
            let m = Math.floor(remaining / 60).toString().padStart(2, '0');
            let s = (remaining % 60).toString().padStart(2, '0');
            document.getElementById('timeDisplay').textContent = `${m}:${s}`;
        }

        function showModal(title, text) { 
            document.getElementById('modalTitle').textContent = title; 
            document.getElementById('modalText').textContent = text; 
            document.getElementById('reminderModal').classList.add('active'); 
        }

        function closeModal() { 
            document.getElementById('reminderModal').classList.remove('active'); 
        }

        function checkReminders(s) {
            if (s <= 15 * 60 + 10 && s >= 15 * 60 && !notified15Min) {
                showModal("⏳ 剩餘 15 分鐘", "請準備宣佈考試即將結束。");
                notified15Min = true; 
                saveExamState(); // 🌟
            }
            if (s <= 5 * 60 + 10 && s >= 5 * 60 && !notified5Min) {
                showModal("🛑 剩餘 5 分鐘", "請宣佈：「停止去洗手間」。");
                notified5Min = true; 
                saveExamState(); // 🌟
            }
        }

        function startTimer() {
            if (isRunning || remaining <= 0) return;
            isRunning = true;
            document.getElementById('levelSelect').disabled = true;
            document.getElementById('paperSelect').disabled = true;
            endTime = Date.now() + (remaining * 1000);
            
            saveExamState(); // 🌟

            timer = setInterval(() => {
                remaining = Math.max(0, Math.floor((endTime - Date.now()) / 1000));
                updateDisplay();
                checkReminders(remaining);
                
                if (remaining <= 0) { 
                    clearInterval(timer); 
                    isRunning = false; 
                    saveExamState();
                }
            }, 1000);
            
            let endObj = new Date(endTime);
            document.getElementById('timeEndsAt').textContent = `預計結束：${endObj.getHours().toString().padStart(2, '0')}:${endObj.getMinutes().toString().padStart(2, '0')}`;
        }

        function pauseTimer() { 
            clearInterval(timer); 
            isRunning = false; 
            saveExamState(); // 🌟
        }

        function resetTimer() {
            if (confirm("確定要重置嗎？這將允許重新選擇考卷。")) {
                pauseTimer(); remaining = 0; updateDisplay();
                notified15Min = false; notified5Min = false;
                
                document.getElementById('levelSelect').disabled = false;
                document.getElementById('levelSelect').value = "";
                document.getElementById('paperSelect').disabled = true;
                document.getElementById('paperSelect').innerHTML = '<option value="">請先選擇級別...</option>';
                document.getElementById('examTitle').textContent = "尚未選擇考卷";
                document.getElementById('timeEndsAt').textContent = "預計結束：--:--";
                
                localStorage.removeItem('examState'); // 🌟 清除記憶
            }
        }

        function adjustTime() {
            let amt = parseInt(document.getElementById('adjMins').value) * 60;
            remaining += amt;
            if (isRunning) endTime += (amt * 1000);
            updateDisplay();
            saveExamState(); // 🌟
        }

        // 自動儲存備註
        document.getElementById('remarksInput').oninput = function() { localStorage.setItem('remarks', this.value); };
    </script>
</body>
</html>
